<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;
  --surface:#1a1a1a;
  --surface2:#222;
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --text:#f0ece4;
  --muted:#888;
  --muted2:#555;
  --accent:#D85A30;
  --accent2:#e8733f;
  --green:#3a7d44;
  --amber:#8a6a1e;
  --red:#7a2e2e;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:15px;line-height:1.5}

/* Layout */
.shell{max-width:520px;margin:0 auto;padding:0 0 3rem}
header{padding:2rem 1.5rem 1.5rem;border-bottom:0.5px solid var(--border)}
.logo{font-family:'Fraunces',serif;font-size:22px;font-weight:500;letter-spacing:-0.02em;color:var(--text)}
.logo span{color:var(--accent);font-style:italic}
.tagline{font-size:12px;color:var(--muted);margin-top:3px;letter-spacing:0.06em;text-transform:uppercase}

/* Tabs */
.tabs{display:flex;border-bottom:0.5px solid var(--border);padding:0 1.5rem;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font-size:13px;padding:14px 16px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:0.02em;transition:color .15s,border-color .15s;font-weight:500}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}

/* Panels */
.panel{display:none;padding:1.5rem;flex-direction:column;gap:1.25rem}
.panel.active{display:flex}

/* Cards */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem}
.card-title{font-family:'Fraunces',serif;font-size:14px;font-weight:500;color:var(--muted);letter-spacing:0.03em;margin-bottom:1rem;text-transform:uppercase}

/* Metrics */
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.metric{background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;padding:.875rem 1rem}
.metric .lbl{font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px}
.metric .val{font-size:26px;font-weight:500;color:var(--text);font-variant-numeric:tabular-nums;line-height:1}
.metric .sub{font-size:11px;color:var(--muted);margin-top:4px}
.metric.accent-val .val{color:var(--accent)}

/* Week ring */
.week-hero{display:flex;align-items:center;gap:1.5rem;padding:1.25rem;background:var(--surface);border:0.5px solid var(--border);border-radius:12px}
.ring-wrap{flex-shrink:0;width:100px;height:100px;position:relative}
.ring-wrap svg{width:100px;height:100px}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-center .rn{font-size:30px;font-weight:500;font-variant-numeric:tabular-nums;line-height:1;color:var(--text)}
.ring-center .rl{font-size:10px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-top:2px}
.week-meta{flex:1;min-width:0}
.week-date{font-family:'Fraunces',serif;font-size:16px;color:var(--text);margin-bottom:4px}
.week-range{font-size:12px;color:var(--muted)}
.week-pct{margin-top:.75rem;display:flex;align-items:center;gap:8px}
.pct-bar{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.pct-fill{height:100%;background:var(--accent);border-radius:2px}
.pct-label{font-size:11px;color:var(--muted);white-space:nowrap}

/* Form */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;color:var(--muted);letter-spacing:0.04em}
.row2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
input,select{
  width:100%;font-size:14px;padding:9px 12px;
  background:var(--surface2);border:0.5px solid var(--border2);
  border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;
  appearance:none;-webkit-appearance:none;
  transition:border-color .15s
}
input:focus,select:focus{outline:none;border-color:var(--accent)}
input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(0.3);cursor:pointer}
input[type="number"]::-webkit-inner-spin-button{opacity:0.4}

/* Result rows */
.res-rows{display:flex;flex-direction:column;gap:0}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:14px}
.res-row:last-child{border-bottom:none}
.res-key{color:var(--muted)}
.res-val{font-weight:500;color:var(--text);font-variant-numeric:tabular-nums}
.res-val.hi{color:var(--accent)}

/* Decision badge */
.decision{text-align:center;padding:.875rem;border-radius:8px;font-size:15px;font-weight:500;letter-spacing:0.01em}
.do-it{background:rgba(58,125,68,0.15);color:#6cc97a;border:0.5px solid rgba(58,125,68,0.3)}
.automate{background:rgba(138,106,30,0.15);color:#d4a84b;border:0.5px solid rgba(138,106,30,0.3)}
.delegate{background:rgba(93,110,200,0.15);color:#8fa0f0;border:0.5px solid rgba(93,110,200,0.3)}
.skip-it{background:rgba(122,46,46,0.15);color:#e07070;border:0.5px solid rgba(122,46,46,0.3)}

/* Goals */
.goal-item{background:var(--surface2);border:0.5px solid var(--border);border-radius:10px;padding:1rem}
.goal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.625rem}
.goal-name{font-weight:500;font-size:14px;color:var(--text)}
.del-btn{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:20px;line-height:1;padding:0;margin-left:8px;flex-shrink:0}
.del-btn:hover{color:var(--muted)}
.goal-bar{height:3px;background:var(--border2);border-radius:2px;overflow:hidden;margin-bottom:.625rem}
.goal-fill{height:100%;background:var(--accent);border-radius:2px}
.goal-badges{display:flex;flex-wrap:wrap;gap:5px}
.badge{font-size:11px;padding:3px 8px;border-radius:4px;background:var(--surface);border:0.5px solid var(--border2);color:var(--muted);font-variant-numeric:tabular-nums}
.badge.urgent{background:rgba(216,90,48,0.1);color:#e8733f;border-color:rgba(216,90,48,0.25)}
.badge.pace{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.empty-state{text-align:center;font-size:13px;color:var(--muted);padding:2rem 1rem}

/* Button */
button.primary{
  width:100%;padding:10px 16px;
  background:var(--accent);color:#fff;
  border:none;border-radius:8px;
  font-size:14px;font-weight:500;font-family:'Inter',sans-serif;
  cursor:pointer;transition:background .15s
}
button.primary:hover{background:var(--accent2)}

/* ROI advice */
.advice{font-size:13px;color:var(--muted);line-height:1.6;padding-top:.625rem;border-top:0.5px solid var(--border)}

/* Separator label */
.sep{display:flex;align-items:center;gap:.75rem;margin:.25rem 0;color:var(--muted2);font-size:11px;letter-spacing:0.06em;text-transform:uppercase}
.sep::before,.sep::after{content:'';flex:1;height:0.5px;background:var(--border)}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="logo">Time<span>Command</span></div>
        <div class="tagline">Week · Calc · Goals · ROI</div>
      </div>
      <a href="https://iggym.github.io/utility-belt/" style="font-size:12px;color:var(--muted);text-decoration:none;letter-spacing:0.06em;text-transform:uppercase;margin-top:4px;border-bottom:0.5px solid var(--muted2);padding-bottom:1px;transition:color .15s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Home</a>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('week')">Week</div>
    <div class="tab" onclick="switchTab('calc')">Calculator</div>
    <div class="tab" onclick="switchTab('goals')">Goals</div>
    <div class="tab" onclick="switchTab('roi')">ROI</div>
  </div>

  <!-- WEEK -->
  <div class="panel active" id="panel-week">
    <div class="week-hero">
      <div class="ring-wrap">
        <svg viewBox="0 0 100 100" fill="none" aria-hidden="true">
          <circle cx="50" cy="50" r="42" stroke="rgba(255,255,255,0.07)" stroke-width="7"/>
          <circle id="wring" cx="50" cy="50" r="42" stroke="#D85A30" stroke-width="7" stroke-linecap="round"
            stroke-dasharray="263.9" stroke-dashoffset="263.9" transform="rotate(-90 50 50)"/>
        </svg>
        <div class="ring-center">
          <div class="rn" id="wnum">—</div>
          <div class="rl">of 52</div>
        </div>
      </div>
      <div class="week-meta">
        <div class="week-date" id="today-str">—</div>
        <div class="week-range" id="week-range">—</div>
        <div class="week-pct">
          <div class="pct-bar"><div class="pct-fill" id="pct-fill" style="width:0%"></div></div>
          <div class="pct-label" id="pct-label">0%</div>
        </div>
      </div>
    </div>

    <div class="metric-grid">
      <div class="metric"><div class="lbl">Week number</div><div class="val" id="m-wn">—</div></div>
      <div class="metric"><div class="lbl">Weeks left</div><div class="val" id="m-wl">—</div></div>
      <div class="metric"><div class="lbl">Days left this week</div><div class="val" id="m-dl">—</div></div>
      <div class="metric"><div class="lbl">Quarter</div><div class="val" id="m-q">—</div></div>
      <div class="metric"><div class="lbl">Days left in year</div><div class="val" id="m-dy">—</div></div>
      <div class="metric accent-val"><div class="lbl">Year complete</div><div class="val" id="m-yp">—</div></div>
    </div>
  </div>

  <!-- CALC -->
  <div class="panel" id="panel-calc">
    <div class="card">
      <div class="card-title">Time span</div>
      <div class="row2" style="margin-bottom:1rem">
        <div class="field"><label>From</label><input type="time" id="from-t" value="09:00"></div>
        <div class="field"><label>To</label><input type="time" id="to-t" value="17:00"></div>
      </div>
      <div class="res-rows" id="span-result"></div>
    </div>

    <div class="card">
      <div class="card-title">Add time to start</div>
      <div class="field" style="margin-bottom:.75rem"><label>Start time</label><input type="time" id="add-start" value="09:00"></div>
      <div class="row2" style="margin-bottom:1rem">
        <div class="field"><label>+ Hours</label><input type="number" id="add-h" min="0" max="99" value="2"></div>
        <div class="field"><label>+ Minutes</label><input type="number" id="add-m" min="0" max="59" value="30"></div>
      </div>
      <div class="res-rows" id="add-result"></div>
    </div>

    <div class="card">
      <div class="card-title">Work session planner</div>
      <div class="row2" style="margin-bottom:.75rem">
        <div class="field"><label>Start</label><input type="time" id="ws-start" value="09:00"></div>
        <div class="field"><label>End</label><input type="time" id="ws-end" value="17:00"></div>
      </div>
      <div class="row2" style="margin-bottom:1rem">
        <div class="field"><label>Break (min)</label><input type="number" id="ws-break" value="60" min="0"></div>
        <div class="field"><label>Session (min)</label><input type="number" id="ws-session" value="90" min="15"></div>
      </div>
      <div class="res-rows" id="ws-result"></div>
    </div>
  </div>

  <!-- GOALS -->
  <div class="panel" id="panel-goals">
    <div class="card">
      <div class="card-title">New goal</div>
      <div class="field" style="margin-bottom:.75rem">
        <label>Goal name</label>
        <input type="text" id="g-name" placeholder="e.g. Launch product, Write book" maxlength="60">
      </div>
      <div class="row2" style="margin-bottom:.75rem">
        <div class="field"><label>Deadline</label><input type="date" id="g-date"></div>
        <div class="field"><label>Unit</label><input type="text" id="g-unit" placeholder="pages, features…" maxlength="20"></div>
      </div>
      <div class="field" style="margin-bottom:1rem">
        <label>Total units needed</label>
        <input type="number" id="g-total" min="1" placeholder="e.g. 20 chapters">
      </div>
      <button class="primary" onclick="addGoal()">Add goal</button>
    </div>
    <div id="goals-list"></div>
  </div>

  <!-- ROI -->
  <div class="panel" id="panel-roi">
    <div class="card">
      <div class="card-title">Task inputs</div>
      <div class="field" style="margin-bottom:.75rem">
        <label>Minutes per occurrence</label>
        <input type="number" id="r-min" value="30" min="1">
      </div>
      <div class="row2" style="margin-bottom:.75rem">
        <div class="field"><label>Times per week</label><input type="number" id="r-freq" value="5" min="1"></div>
        <div class="field"><label>Your $/hour</label><input type="number" id="r-rate" value="150" min="1"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Analysis</div>
      <div id="roi-decision" class="decision" style="margin-bottom:1rem"></div>
      <div class="res-rows" id="roi-rows"></div>
    </div>

    <div class="card">
      <div class="card-title">Automate vs delegate</div>
      <div class="advice" id="roi-advice" style="border-top:none;padding-top:0"></div>
    </div>
  </div>
</div>

<script>
const now = new Date();

function getWeekNumber(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - day);
  const y = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - y) / 86400000) + 1) / 7);
}

function fmt12(h, m) {
  const ampm = h >= 12 ? 'pm' : 'am';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2, '0')} ${ampm}`;
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function initWeek() {
  const wn = getWeekNumber(now);
  const wl = 52 - wn;
  const dow = now.getDay();
  const dlw = dow === 0 ? 0 : 7 - dow;
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  const doy = Math.floor(diff / 86400000);
  const dly = 365 - doy;
  const yp = Math.round((doy / 365) * 100);
  const q = Math.ceil((now.getMonth() + 1) / 3);

  document.getElementById('wnum').textContent = wn;
  document.getElementById('m-wn').textContent = wn;
  document.getElementById('m-wl').textContent = wl;
  document.getElementById('m-dl').textContent = dlw === 0 ? '0' : dlw;
  document.getElementById('m-q').textContent = 'Q' + q;
  document.getElementById('m-dy').textContent = dly;
  document.getElementById('m-yp').textContent = yp + '%';
  document.getElementById('pct-fill').style.width = yp + '%';
  document.getElementById('pct-label').textContent = yp + '% of year';
  document.getElementById('today-str').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  const ws = new Date(now);
  ws.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  const we = new Date(ws);
  we.setDate(ws.getDate() + 6);
  document.getElementById('week-range').textContent = fmtDate(ws) + ' — ' + fmtDate(we);

  const circ = 2 * Math.PI * 42;
  document.getElementById('wring').style.strokeDashoffset = circ - (circ * wn / 52);
}

function calcSpan() {
  const f = document.getElementById('from-t').value;
  const t = document.getElementById('to-t').value;
  if (!f || !t) return;
  const [fh, fm] = f.split(':').map(Number);
  const [th, tm] = t.split(':').map(Number);
  let diff = (th * 60 + tm) - (fh * 60 + fm);
  if (diff < 0) diff += 1440;
  const h = Math.floor(diff / 60), m = diff % 60;
  document.getElementById('span-result').innerHTML = `
    <div class="res-row"><span class="res-key">Duration</span><span class="res-val hi">${h}h ${m}m</span></div>
    <div class="res-row"><span class="res-key">Total minutes</span><span class="res-val">${diff}</span></div>
    <div class="res-row"><span class="res-key">Decimal hours</span><span class="res-val">${(diff/60).toFixed(2)}</span></div>`;
}

function calcAdd() {
  const s = document.getElementById('add-start').value;
  const h = parseInt(document.getElementById('add-h').value) || 0;
  const m = parseInt(document.getElementById('add-m').value) || 0;
  if (!s) return;
  const [sh, sm] = s.split(':').map(Number);
  const total = sh * 60 + sm + h * 60 + m;
  const eh = Math.floor(total / 60) % 24, em = total % 60;
  const nd = total >= 1440 ? ' <span style="font-size:11px;color:var(--muted)">(+1 day)</span>' : '';
  document.getElementById('add-result').innerHTML = `
    <div class="res-row"><span class="res-key">End time</span><span class="res-val hi">${fmt12(eh, em)}${nd}</span></div>
    <div class="res-row"><span class="res-key">Added</span><span class="res-val">${h}h ${m}m</span></div>`;
}

function calcWS() {
  const s = document.getElementById('ws-start').value;
  const e = document.getElementById('ws-end').value;
  const br = parseInt(document.getElementById('ws-break').value) || 0;
  const sess = parseInt(document.getElementById('ws-session').value) || 90;
  if (!s || !e) return;
  const [sh, sm] = s.split(':').map(Number);
  const [eh, em] = e.split(':').map(Number);
  let total = (eh * 60 + em) - (sh * 60 + sm);
  if (total < 0) total += 1440;
  const work = Math.max(0, total - br);
  const sessions = Math.floor(work / sess);
  document.getElementById('ws-result').innerHTML = `
    <div class="res-row"><span class="res-key">Total span</span><span class="res-val">${Math.floor(total/60)}h ${total%60}m</span></div>
    <div class="res-row"><span class="res-key">Work time</span><span class="res-val hi">${Math.floor(work/60)}h ${work%60}m</span></div>
    <div class="res-row"><span class="res-key">${sess}-min blocks</span><span class="res-val">${sessions} sessions</span></div>
    <div class="res-row"><span class="res-key">Remaining after blocks</span><span class="res-val">${work - sessions*sess} min</span></div>`;
}

let goals = [];
try { goals = JSON.parse(localStorage.getItem('tcc-goals') || '[]'); } catch(e) {}

function saveGoals() { try { localStorage.setItem('tcc-goals', JSON.stringify(goals)); } catch(e) {} }

function addGoal() {
  const name = document.getElementById('g-name').value.trim();
  const date = document.getElementById('g-date').value;
  const unit = document.getElementById('g-unit').value.trim() || 'units';
  const total = parseInt(document.getElementById('g-total').value) || 1;
  if (!name || !date) { alert('Name and deadline required.'); return; }
  goals.push({ id: Date.now(), name, date, unit, total });
  saveGoals();
  renderGoals();
  ['g-name','g-date','g-unit','g-total'].forEach(id => document.getElementById(id).value = '');
}

function deleteGoal(id) {
  goals = goals.filter(g => g.id !== id);
  saveGoals();
  renderGoals();
}

function renderGoals() {
  const el = document.getElementById('goals-list');
  if (!goals.length) {
    el.innerHTML = '<div class="empty-state">No goals yet. Add one above to start tracking.</div>';
    return;
  }
  el.innerHTML = goals.map(g => {
    const dl = new Date(g.date + 'T23:59:59');
    const msLeft = dl - now;
    const daysLeft = Math.max(0, Math.ceil(msLeft / 86400000));
    const weeksLeft = Math.max(1, Math.ceil(daysLeft / 7));
    const hoursLeft = Math.round(daysLeft * 16);
    const pace = (g.total / weeksLeft).toFixed(1);
    const created = new Date(g.id);
    const totalDays = Math.max(1, Math.ceil((dl - created) / 86400000));
    const elapsed = totalDays - daysLeft;
    const pct = Math.min(100, Math.max(0, Math.round((elapsed / totalDays) * 100)));
    const urgent = weeksLeft <= 2;
    return `<div class="goal-item">
      <div class="goal-header">
        <div class="goal-name">${g.name}</div>
        <button class="del-btn" onclick="deleteGoal(${g.id})" aria-label="Remove goal">×</button>
      </div>
      <div class="goal-bar"><div class="goal-fill" style="width:${pct}%"></div></div>
      <div class="goal-badges">
        <span class="badge ${urgent ? 'urgent' : ''}">${daysLeft}d left</span>
        <span class="badge">${hoursLeft}h (est.)</span>
        <span class="badge ${weeksLeft <= 1 ? 'urgent' : ''}">${weeksLeft}w</span>
        <span class="badge pace">${pace} ${g.unit}/wk</span>
      </div>
    </div>`;
  }).join('');
}

function calcROI() {
  const min = parseFloat(document.getElementById('r-min').value) || 30;
  const freq = parseFloat(document.getElementById('r-freq').value) || 5;
  const rate = parseFloat(document.getElementById('r-rate').value) || 150;

  const annualMin = min * freq * 52;
  const annualHrs = annualMin / 60;
  const annualCost = annualHrs * rate;
  const breakEven = annualCost * 0.5;
  const perOcc = (min / 60) * rate;

  let decision, cls, advice;
  if (annualCost > 5000 && freq >= 3) {
    decision = 'Automate it'; cls = 'automate';
    advice = `Break-even at $${Math.round(breakEven).toLocaleString()} — well within range for a Cloudflare Worker, Make.com flow, or lightweight SaaS. Build or buy within the quarter.`;
  } else if (annualCost > 2000) {
    decision = 'Delegate it'; cls = 'delegate';
    advice = `At $${Math.round(annualCost).toLocaleString()}/yr, a VA or junior resource at $25-40/hr pays for itself fast. Document the steps once, delegate permanently.`;
  } else if (annualCost > 800) {
    decision = 'Batch and delegate'; cls = 'delegate';
    advice = `Not urgent to automate, but worth batching into one weekly block or offloading. Track time for 30 days — if it grows, automate.`;
  } else {
    decision = 'Just do it'; cls = 'do-it';
    advice = `Low annual cost. Optimizing this isn't worth the overhead. Do it, batch it, and move on.`;
  }

  document.getElementById('roi-decision').className = 'decision ' + cls;
  document.getElementById('roi-decision').textContent = decision;
  document.getElementById('roi-rows').innerHTML = `
    <div class="res-row"><span class="res-key">Per-occurrence cost</span><span class="res-val">$${perOcc.toFixed(2)}</span></div>
    <div class="res-row"><span class="res-key">Annual hours</span><span class="res-val">${annualHrs.toFixed(1)} hrs</span></div>
    <div class="res-row"><span class="res-key">Annual dollar cost</span><span class="res-val hi">$${Math.round(annualCost).toLocaleString()}</span></div>
    <div class="res-row"><span class="res-key">Break-even automation cost</span><span class="res-val">$${Math.round(breakEven).toLocaleString()}</span></div>`;
  document.getElementById('roi-advice').textContent = advice;
}

function switchTab(t) {
  const keys = ['week','calc','goals','roi'];
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', keys[i] === t));
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.getElementById('panel-' + t).classList.add('active');
}

['from-t','to-t'].forEach(id => document.getElementById(id).addEventListener('change', calcSpan));
['add-start','add-h','add-m'].forEach(id => document.getElementById(id).addEventListener('input', calcAdd));
['ws-start','ws-end','ws-break','ws-session'].forEach(id => document.getElementById(id).addEventListener('input', calcWS));
['r-min','r-freq','r-rate'].forEach(id => document.getElementById(id).addEventListener('input', calcROI));

initWeek(); calcSpan(); calcAdd(); calcWS(); renderGoals(); calcROI();
</script>
