<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Engine</title>
    <style>
        :root {
            --bg-main: #0d1117;
            --bg-surface: #161b22;
            --bg-card: #21262d;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-green: #238636;
            --accent-red: #da3633;
            --accent-purple: #8957e5;
            --accent-orange: #d29922;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font);
            line-height: 1.5;
            padding-bottom: 60px;
        }

        /* Enhanced Diagnostic Error Console Style */
        #systemErrorConsole {
            display: none;
            background: rgba(218, 54, 51, 0.12);
            border-bottom: 1px solid var(--accent-red);
            padding: 12px 16px;
            color: #ff7b72;
            font-family: monospace;
            font-size: 13px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        #systemErrorConsole .close-err-btn {
            float: right;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
        }

        header {
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header.with-error {
            top: 45px;
        }

        .brand-zone {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .back-link:hover {
            color: var(--accent);
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .search-container {
            padding: 12px 16px;
            background: var(--bg-main);
        }

        .search-bar {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent);
        }

        .nav-tabs {
            display: flex;
            overflow-x: auto;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            scrollbar-width: none;
        }

        .nav-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 14px 16px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn.active {
            color: var(--text-main);
            border-bottom-color: var(--accent);
        }

        .badge {
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 600;
        }

        .tab-btn.active .badge {
            background: var(--accent);
            color: var(--bg-main);
        }

        .content-view {
            padding: 16px;
            display: none;
        }

        .content-view.active {
            display: block;
        }

        .quick-capture-box {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .quick-input {
            flex: 1;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }

        .quick-input:focus {
            border-color: var(--accent);
        }

        .btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            border-color: var(--text-muted);
        }

        .btn-primary {
            background: var(--accent-green);
            border-color: rgba(240,246,252,0.1);
            color: #fff;
        }

        .btn-primary:hover {
            background: #2ea44f;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: border-color 0.15s ease;
        }

        .task-card.pinned {
            border-left: 3px solid var(--accent-orange);
        }

        .task-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .task-check {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-green);
        }

        .task-title {
            flex: 1;
            font-size: 15px;
            font-weight: 500;
            word-break: break-word;
        }

        .task-card.done-state .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .meta-line {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .tag-pill {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--bg-card);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .p-pill { font-weight: bold; }
        .p-P0 { color: var(--accent-red); }
        .p-P1 { color: var(--accent-orange); }
        .p-P2 { color: var(--accent); }
        .p-P3 { color: var(--text-main); }
        .p-P4 { color: var(--text-muted); }

        .triage-actions, .editor-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
            border-top: 1px solid var(--border-color);
            padding-top: 8px;
        }

        .mini-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
        }

        .mini-btn:hover, .mini-btn.active {
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        .expanded-pane {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            margin-top: 4px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 8px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 4px;
        }

        .field-group label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .form-select, .form-input, .form-textarea {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            width: 100%;
        }

        .form-textarea {
            font-family: monospace;
            resize: vertical;
            min-height: 80px;
        }

        .io-zone {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .io-box {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 6px;
        }

        .io-box h3 {
            margin-bottom: 12px;
            font-size: 15px;
        }

        .subtask-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .subtask-text {
            font-size: 13px;
            flex: 1;
        }

        .subtask-text.done {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .artifact-pill {
            background: rgba(137, 87, 229, 0.15);
            color: #d1b4ff;
            border: 1px solid var(--accent-purple);
        }

        @media(max-width: 600px) {
            .tab-btn {
                padding: 12px 10px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div id="systemErrorConsole">
        <button class="close-err-btn" onclick="document.getElementById('systemErrorConsole').style.display='none'">×</button>
        <div id="errorMessageText"></div>
    </div>

    <header id="mainHeader">
        <div class="brand-zone">
            <a href="https://iggym.github.io/utility-belt/" class="back-link">← Utility Belt</a>
            <h1>Task Engine</h1>
        </div>
        <button class="btn btn-primary" onclick="window.engine.createNewBlankTask()">+ New Task</button>

        <button class="tab-btn" onclick="window.engine.switchTab('completed')" data-tab="completed">Completed <span class="badge" id="b-completed">0</span></button>
        <button class="tab-btn" onclick="window.engine.switchTab('io')" data-tab="io">IO System</button>

    <div id="view-inbox" class="content-view active">
        <div class="quick-capture-box">
            <input type="text" id="inboxInput" class="quick-input" placeholder="Capture intent or exploration concept..." onkeydown="if(event.key==='Enter') window.engine.quickCapture()">

        </div>
        <div id="list-inbox" class="list-container"></div>
    </div>

    <div id="view-tasks" class="content-view">
        <div id="list-tasks" class="list-container"></div>
    </div>

    <div id="view-working" class="content-view">
        <div id="list-working" class="list-container"></div>
    </div>

    <div id="view-discovery" class="content-view">
        <div id="list-discovery" class="list-container"></div>
    </div>

    <div id="view-completed" class="content-view">
        <div id="list-completed" class="list-container"></div>
    </div>

    <div id="view-io" class="content-view">
        <div class="io-zone">
            <div class="io-box">
                <h3>Daily Snapshot Export</h3>
                <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 12px;">Download current runtime telemetry array as an archival JSON document or flat text log.</p>
                <button class="btn" onclick="window.engine.exportJSON()">Export State JSON</button>
                <button class="btn" onclick="window.engine.exportMarkdown()">Export Flat Log MD</button>
            </div>
            <div class="io-box">
                <h3>State Hydration (Import)</h3>
                <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 12px;">Overwrite engine context window with a historical JSON runtime state snapshot.</p>
                <textarea id="importArea" class="form-textarea" style="min-height: 120px; margin-bottom: 12px;" placeholder="Paste text data payload here..."></textarea>
                <button class="btn btn-primary" onclick="window.engine.importJSON()">Hydrate State Engine</button>
            </div>
        </div>
    </div>

    <script>
        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        class TaskEngine {
            constructor() {
                this.storageKey = 'task_engine_state';
                this.currentTab = 'inbox';
                this.items = [];
                this.loadState();
            }

            reportError(context, error) {
                console.error(`[Engine Exception Error: ${context}]`, error);
                const consoleDiv = document.getElementById('systemErrorConsole');
                const textDiv = document.getElementById('errorMessageText');
                if (consoleDiv && textDiv) {
                    textDiv.innerHTML = `<strong>CRITICAL ERROR [${escapeHtml(context)}]:</strong> ${escapeHtml(error.message || error)}`;
                    consoleDiv.style.display = 'block';
                    document.getElementById('mainHeader').classList.add('with-error');
                }
            }

            clearError() {
                const consoleDiv = document.getElementById('systemErrorConsole');
                if (consoleDiv) {
                    consoleDiv.style.display = 'none';
                    document.getElementById('mainHeader').classList.remove('with-error');
                }
            }

            loadState() {
                try {
                    const raw = localStorage.getItem(this.storageKey);
                    let parsedData = raw ? JSON.parse(raw) : this.getDefaultData();
                    
                    // Defense array structure checking logic
                    if (!Array.isArray(parsedData)) {
                        throw new TypeError("State cache is corrupted or not an index array.");
                    }
                    
                    this.items = parsedData.map(item => this.normalizeItemSchema(item));
                    this.clearError();
                } catch(e) {
                    this.reportError("Cache Hydration Phase", e);
                    this.items = this.normalizeDatasetIds(this.getDefaultData());
                }
            }

            normalizeItemSchema(rawItem) {
                // Ensures all expected structural metrics are safe from missing field exceptions
                return {
                    id: String(rawItem.id || '').trim(),
                    type: String(rawItem.type || 'Task').trim(),
                    title: String(rawItem.title || 'Untitled Operation Instance').trim(),
                    status: String(rawItem.status || 'Inbox').trim(),
                    priority: String(rawItem.priority || 'P2').trim(),
                    project: String(rawItem.project || '').trim(),
                    tags: Array.isArray(rawItem.tags) ? rawItem.tags : [],
                    created: String(rawItem.created || new Date().toISOString().split('T')[0]),
                    due: String(rawItem.due || ''),
                    eta: String(rawItem.eta || ''),
                    energy: String(rawItem.energy || 'Medium'),
                    notes: String(rawItem.notes || ''),
                    subtasks: Array.isArray(rawItem.subtasks) ? rawItem.subtasks : [],
                    outputs: Array.isArray(rawItem.outputs) ? rawItem.outputs : [],
                    pinned: !!rawItem.pinned,
                    nextAction: String(rawItem.nextAction || '')
                };
            }

            normalizeDatasetIds(dataset) {
                return dataset.map(item => this.normalizeItemSchema(item));
            }

            saveState() {
                try {
                    localStorage.setItem(this.storageKey, JSON.stringify(this.items));
                    this.updateBadges();
                    this.clearError();
                } catch(e) {
                    this.reportError("State Persistent Sync", e);
                }
            }

            switchTab(tabId) {
                this.currentTab = tabId;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
                document.querySelectorAll('.content-view').forEach(v => v.classList.toggle('active', v.id === `view-${tabId}`));
                this.render();
                if(tabId === 'inbox') setTimeout(() => document.getElementById('inboxInput')?.focus(), 50);
            }

            quickCapture() {
                try {
                    const input = document.getElementById('inboxInput');
                    const title = input.value.trim();
                    if(!title) return;

                    const shortId = Math.random().toString(16).substring(2, 10);
                    const newItem = this.normalizeItemSchema({
                        id: shortId,
                        type: 'Task',
                        title: title,
                        status: 'Inbox'
                    });

                    this.items.unshift(newItem);
                    this.saveState();
                    input.value = '';
                    this.render();
                } catch(e) {
                    this.reportError("Quick Capture Failure", e);
                }
            }

            createNewBlankTask() {
                this.switchTab('inbox');
                const input = document.getElementById('inboxInput');
                if (input) input.focus();
            }

            updateBadges() {
                try {
                    const query = document.getElementById('globalSearch')?.value.toLowerCase() || '';
                    const match = (item) => {
                        if(!query) return true;
                        return String(item.title).toLowerCase().includes(query) || 
                               String(item.notes).toLowerCase().includes(query) ||
                               String(item.id).toLowerCase().includes(query) ||
                               String(item.project).toLowerCase().includes(query) ||
                               String(item.nextAction).toLowerCase().includes(query) ||
                               item.tags.some(t => String(t).toLowerCase().includes(query)) ||
                               item.outputs.some(o => String(o).toLowerCase().includes(query));
                    };

                    const filtered = this.items.filter(match);

                    document.getElementById('b-inbox').innerText = filtered.filter(i => i.status === 'Inbox').length;
                    document.getElementById('b-tasks').innerText = filtered.filter(i => i.status === 'Ready' || i.status === 'Blocked').length;
                    document.getElementById('b-working').innerText = filtered.filter(i => i.status === 'Working').length;
                    document.getElementById('b-discovery').innerText = filtered.filter(i => i.status === 'Discovery').length;
                    document.getElementById('b-completed').innerText = filtered.filter(i => i.status === 'Done' || i.status === 'Archived').length;
                } catch(e) {
                    this.reportError("Badge Matrix Refresh Error", e);
                }
            }

            render() {
                try {
                    this.updateBadges();
                    if(this.currentTab === 'io') return;

                    const container = document.getElementById(`list-${this.currentTab}`);
                    if(!container) return;
                    container.innerHTML = '';

                    const searchQuery = document.getElementById('globalSearch')?.value.toLowerCase() || '';

                    let filtered = this.items.filter(item => {
                        // Global evaluation matching engine
                        if (searchQuery) {
                            return String(item.title).toLowerCase().includes(searchQuery) || 
                                   String(item.notes).toLowerCase().includes(searchQuery) ||
                                   String(item.id).toLowerCase().includes(searchQuery) ||
                                   String(item.project).toLowerCase().includes(searchQuery) ||
                                   String(item.nextAction).toLowerCase().includes(searchQuery) ||
                                   item.tags.some(t => String(t).toLowerCase().includes(searchQuery)) ||
                                   item.outputs.some(o => String(o).toLowerCase().includes(searchQuery));
                        }
                        
                        // Strict partition routing logic (Case Insensitive Protected)
                        const normalizedStatus = item.status.toLowerCase();
                        if (this.currentTab === 'inbox') return normalizedStatus === 'inbox';
                        if (this.currentTab === 'tasks') return normalizedStatus === 'ready' || normalizedStatus === 'blocked';
                        if (this.currentTab === 'working') return normalizedStatus === 'working';
                        if (this.currentTab === 'discovery') return normalizedStatus === 'discovery';
                        if (this.currentTab === 'completed') return normalizedStatus === 'done' || normalizedStatus === 'archived';
                        return false;
                    });

                    // Priority order stacking
                    filtered.sort((a,b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || a.priority.localeCompare(b.priority));

                    if(filtered.length === 0) {
                        container.innerHTML = `<div style="text-align:center; padding:30px; color:var(--text-muted); font-size:14px;">No items inside processing partition.</div>`;
                        return;
                    }

                    filtered.forEach(item => {
                        const card = document.createElement('div');
                        card.className = `task-card ${item.pinned ? 'pinned' : ''} ${item.status === 'Done' ? 'done-state' : ''}`;
                        card.id = `card-${item.id}`;

                        const totalSubs = item.subtasks.length;
                        const doneSubs = item.subtasks.filter(s => s.done).length;
                        const subString = totalSubs > 0 ? `[${doneSubs}/${totalSubs}]` : '';

                        card.innerHTML = `
                            <div class="task-header">
                                <input type="checkbox" class="task-check" ${item.status === 'Done' ? 'checked' : ''} onclick="event.stopPropagation(); window.engine.toggleComplete('${item.id}')">
                                <div class="task-title" onclick="window.engine.toggleEditPane('${item.id}')" style="cursor:pointer;">
                                    <span style="color:var(--text-muted); font-family:monospace; font-size:12px; margin-right:6px;">${escapeHtml(item.id)}</span>
                                    ${item.project ? `<span style="color:var(--accent); font-weight:bold; font-size:13px; margin-right:4px;">[${escapeHtml(item.project)}]</span>` : ''}
                                    ${escapeHtml(item.title)} <span style="font-size:12px; color:var(--text-muted);">${subString}</span>
                                </div>
                                <button class="mini-btn" onclick="event.stopPropagation(); window.engine.togglePin('${item.id}')" style="color: ${item.pinned ? 'var(--accent-orange)' : 'var(--text-muted)'}">★</button>
                            </div>
                            <div class="meta-line" onclick="window.engine.toggleEditPane('${item.id}')" style="cursor:pointer;">
                                <span class="tag-pill p-pill p-${escapeHtml(item.priority)}">${escapeHtml(item.priority)}</span>
                                <span class="tag-pill" style="color:var(--accent-purple); border-color:rgba(137,87,229,0.3);">${escapeHtml(item.status)}</span>
                                ${item.type === 'Discovery' ? `<span class="tag-pill" style="color:cyan; border-color:rgba(0,255,255,0.2);">🔬 Discovery</span>` : ''}
                                ${item.eta ? `<span class="tag-pill">⏳ ${escapeHtml(item.eta)}</span>` : ''}
                                ${item.energy ? `<span class="tag-pill">⚡ ${escapeHtml(item.energy)}</span>` : ''}
                                ${item.tags.map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('')}
                                ${item.outputs.map(o => `<span class="tag-pill artifact-pill">📦 ${escapeHtml(o)}</span>`).join('')}
                            </div>
                            ${item.nextAction ? `<div style="font-size:12px; color:var(--accent-orange); background:rgba(210,153,34,0.05); padding:4px 8px; border-radius:4px; border:1px dashed rgba(210,153,34,0.2);"><strong>Next Action:</strong> ${escapeHtml(item.nextAction)}</div>` : ''}
                            
                            <div class="triage-actions" onclick="event.stopPropagation();">
                                <span style="font-size:11px; color:var(--text-muted); align-self:center; margin-right:4px;">Triage:</span>
                                <button class="mini-btn ${item.status==='Inbox'?'active':''}" onclick="window.engine.updateItemStatus('${item.id}', 'Inbox')">Inbox</button>
                                <button class="mini-btn ${item.status==='Ready'?'active':''}" onclick="window.engine.updateItemStatus('${item.id}', 'Ready')">Ready</button>
                                <button class="mini-btn ${item.status==='Working'?'active':''}" onclick="window.engine.updateItemStatus('${item.id}', 'Working')">Working</button>
                                <button class="mini-btn ${item.status==='Discovery'?'active':''}" onclick="window.engine.updateItemStatus('${item.id}', 'Discovery')">Discovery</button>
                                <button class="mini-btn ${item.status==='Blocked'?'active':''}" onclick="window.engine.updateItemStatus('${item.id}', 'Blocked')">Blocked</button>
                                <button class="mini-btn ${item.status==='Done'?'active':''}" onclick="window.engine.updateItemStatus('${item.id}', 'Done')">Done</button>
                                <button class="mini-btn" onclick="window.engine.removeItem('${item.id}')" style="color:var(--accent-red); margin-left:auto;">Drop</button>
                            </div>

                            <div id="pane-${item.id}" class="expanded-pane" style="display:none;" onclick="event.stopPropagation();"></div>
                        `;
                        container.appendChild(card);
                    });
                } catch(e) {
                    this.reportError("Render Execution Engine Stack", e);
                }
            }

            toggleComplete(id) {
                const item = this.items.find(i => i.id === id);
                if(!item) return;
                item.status = item.status === 'Done' ? 'Ready' : 'Done';
                this.saveState();
                this.render();
            }

            togglePin(id) {
                const item = this.items.find(i => i.id === id);
                if(!item) return;
                item.pinned = !item.pinned;
                this.saveState();
                this.render();
            }

            updateItemStatus(id, targetStatus) {
                const item = this.items.find(i => i.id === id);
                if(!item) return;
                item.status = targetStatus;
                if(targetStatus === 'Discovery') item.type = 'Discovery';
                this.saveState();
                this.render();
            }

            removeItem(id) {
                if(confirm("Confirm deletion of task instance context?")) {
                    this.items = this.items.filter(i => i.id !== id);
                    this.saveState();
                    this.render();
                }
            }

            patchItem(id, key, value) {
                try {
                    const item = this.items.find(i => i.id === id);
                    if(!item) return;
                    item[key] = value;
                    this.saveState();
                } catch(e) {
                    this.reportError("Field Patch Mutation", e);
                }
            }

            patchTags(id, value) {
                const item = this.items.find(i => i.id === id);
                if(!item) return;
                item.tags = value.split(',').map(t => t.trim()).filter(t => t.length > 0);
                this.saveState();
            }

            patchOutputs(id, value) {
                const item = this.items.find(i => i.id === id);
                if(!item) return;
                item.outputs = value.split(',').map(o => o.trim()).filter(o => o.length > 0);
                this.saveState();
            }

            toggleEditPane(id) {
                try {
                    const pane = document.getElementById(`pane-${id}`);
                    if(!pane) return;
                    if(pane.style.display === 'block') {
                        pane.style.display = 'none';
                        this.render(); // Smooth update save layout
                        return;
                    }
                    
                    const item = this.items.find(i => i.id === id);
                    if(!item) return;

                    pane.innerHTML = `
                        <div class="form-grid">
                            <div class="field-group">
                                <label>Structure Classification</label>
                                <select onchange="window.engine.patchItem('${id}', 'type', this.value)" class="form-select">
                                    <option value="Task" ${item.type==='Task'?'selected':''}>Task Container</option>
                                    <option value="Discovery" ${item.type==='Discovery'?'selected':''}>Discovery Asset</option>
                                </select>
                            </div>
                            <div class="field-group">
                                <label>Execution Tier</label>
                                <select onchange="window.engine.patchItem('${id}', 'priority', this.value)" class="form-select">
                                    <option value="P0" ${item.priority==='P0'?'selected':''}>P0 - Focus Direct</option>
                                    <option value="P1" ${item.priority==='P1'?'selected':''}>P1 - Mission Crit</option>
                                    <option value="P2" ${item.priority==='P2'?'selected':''}>P2 - Balanced</option>
                                    <option value="P3" ${item.priority==='P3'?'selected':''}>P3 - Backburner</option>
                                    <option value="P4" ${item.priority==='P4'?'selected':''}>P4 - Speculative</option>
                                </select>
                            </div>
                            <div class="field-group">
                                <label>Project Domain</label>
                                <input type="text" value="${escapeHtml(item.project || '')}" placeholder="e.g. Website, AI" onchange="window.engine.patchItem('${id}', 'project', this.value)" class="form-input">
                            </div>
                            <div class="field-group">
                                <label>Context Footprint (ETA)</label>
                                <input type="text" value="${escapeHtml(item.eta || '')}" placeholder="5 min, 1 hr" onchange="window.engine.patchItem('${id}', 'eta', this.value)" class="form-input">
                            </div>
                            <div class="field-group">
                                <label>Energy Required</label>
                                <select onchange="window.engine.patchItem('${id}', 'energy', this.value)" class="form-select">
                                    <option value="Low" ${item.energy==='Low'?'selected':''}>Low Energy</option>
                                    <option value="Medium" ${item.energy==='Medium'?'selected':''}>Medium Energy</option>
                                    <option value="High" ${item.energy==='High'?'selected':''}>High Energy</option>
                                </select>
                            </div>
                            <div class="field-group">
                                <label>Target Execution Lock</label>
                                <input type="date" value="${item.due || ''}" onchange="window.engine.patchItem('${id}', 'due', this.value)" class="form-input">
                            </div>
                        </div>

                        <div class="field-group">
                            <label>Core Manifest Title</label>
                            <input type="text" value="${escapeHtml(item.title)}" onchange="window.engine.patchItem('${id}', 'title', this.value)" class="form-input">
                        </div>

                        <div class="field-group">
                            <label>Immediate Next Step</label>
                            <input type="text" value="${escapeHtml(item.nextAction || '')}" placeholder="Atomic step required to unlock item..." onchange="window.engine.patchItem('${id}', 'nextAction', this.value)" class="form-input">
                        </div>

                        <div class="field-group">
                            <label>Metadata Tags (Comma delim)</label>
                            <input type="text" value="${escapeHtml(item.tags.join(', '))}" placeholder="#writing, #research" onchange="window.engine.patchTags('${id}', this.value)" class="form-input">
                        </div>

                        <div class="field-group">
                            <label>Produced Work Artifacts / Outputs (Comma delim)</label>
                            <input type="text" value="${escapeHtml(item.outputs.join(', '))}" placeholder="output.html, spec.json" onchange="window.engine.patchOutputs('${id}', this.value)" class="form-input">
                        </div>

                        <div class="field-group">
                            <label>Technical Manifest / Raw Notes (Markdown Safe)</label>
                            <textarea class="form-textarea" onchange="window.engine.patchItem('${id}', 'notes', this.value)" placeholder="Enter technical design specs, criteria or payload context structures...">${escapeHtml(item.notes || '')}</textarea>
                        </div>

                        <div class="field-group">
                            <label>Subtask Arrays</label>
                            <div id="subtasks-list-${id}"></div>
                            <div style="display:flex; gap:4px; margin-top:4px;">
                                <input type="text" id="new-sub-${id}" class="form-input" placeholder="Append structural subtask step...">
                                <button class="btn btn-primary" style="padding:4px 12px;" onclick="window.engine.addSubtask('${id}')">+</button>
                            </div>
                        </div>
                    `;
                    
                    this.renderSubtasksPane(id);
                    pane.style.display = 'block';
                } catch(e) {
                    this.reportError("Editor Overlay Launch Failure", e);
                }
            }

            renderSubtasksPane(id) {
                const item = this.items.find(i => i.id === id);
                const subContainer = document.getElementById(`subtasks-list-${id}`);
                if (!item || !subContainer) return;
                subContainer.innerHTML = '';

                item.subtasks.forEach((sub, idx) => {
                    const div = document.createElement('div');
                    div.className = 'subtask-item';
                    div.innerHTML = `
                        <input type="checkbox" ${sub.done ? 'checked' : ''} onclick="window.engine.toggleSubtask('${id}', ${idx})">
                        <span class="subtask-text ${sub.done ? 'done' : ''}"><strong>${escapeHtml(sub.title)}</strong> ${sub.description ? `- ${escapeHtml(sub.description)}` : ''}</span>
                        <button class="mini-btn" style="color:var(--accent-red);" onclick="window.engine.deleteSubtask('${id}', ${idx})">×</button>
                    `;
                    subContainer.appendChild(div);
                });
            }

            addSubtask(id) {
                const input = document.getElementById(`new-sub-${id}`);
                const val = input?.value.trim();
                if (!val) return;

                const item = this.items.find(i => i.id === id);
                if (!item) return;

                item.subtasks.push({ title: val, description: '', done: false });
                this.saveState();
                this.renderSubtasksPane(id);
                if (input) input.value = '';
            }

            toggleSubtask(id, idx) {
                const item = this.items.find(i => i.id === id);
                if (!item || !item.subtasks[idx]) return;
                item.subtasks[idx].done = !item.subtasks[idx].done;
                this.saveState();
                this.renderSubtasksPane(id);
            }

            deleteSubtask(id, idx) {
                const item = this.items.find(i => i.id === id);
                if (!item || !item.subtasks[idx]) return;
                item.subtasks.splice(idx, 1);
                this.saveState();
                this.renderSubtasksPane(id);
            }

            exportJSON() {
                try {
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.items, null, 2));
                    const downloadAnchor = document.createElement('a');
                    downloadAnchor.setAttribute("href", dataStr);
                    downloadAnchor.setAttribute("download", `task_engine_backup_${new Date().toISOString().split('T')[0]}.json`);
                    document.body.appendChild(downloadAnchor);
                    downloadAnchor.click();
                    downloadAnchor.remove();
                    this.clearError();
                } catch(e) {
                    this.reportError("JSON Bulk Packaging Export", e);
                }
            }

            exportMarkdown() {
                try {
                    let md = `# Task Engine Flat Log - ${new Date().toISOString().split('T')[0]}\n\n`;
                    this.items.forEach(i => {
                        md += `## [${i.status}] ${i.title} (${i.id})\n`;
                        md += `- **Type**: ${i.type} | **Priority**: ${i.priority} | **Domain**: ${i.project || 'None'}\n`;
                        md += `- **Metrics**: Time: ${i.eta || 'N/A'} | Energy: ${i.energy}\n`;
                        if(i.nextAction) md += `- **Next Immediate Step**: ${i.nextAction}\n`;
                        if(i.tags.length) md += `- **Tags**: ${i.tags.join(', ')}\n`;
                        if(i.outputs.length) md += `- **Produced Assets**: ${i.outputs.join(', ')}\n`;
                        if(i.notes) md += `\n### Architectural Notes & Specs\n\`\`\`text\n${i.notes}\n\`\`\`\n`;
                        if(i.subtasks.length) {
                            md += `\n### Subtask Manifest Track\n`;
                            i.subtasks.forEach(s => md += `- [${s.done ? 'x' : ' '}] ${s.title}\n`);
                        }
                        md += `\n---\n\n`;
                    });

                    const dataStr = "data:text/markdown;charset=utf-8," + encodeURIComponent(md);
                    const downloadAnchor = document.createElement('a');
                    downloadAnchor.setAttribute("href", dataStr);
                    downloadAnchor.setAttribute("download", `task_engine_flatlog_${new Date().toISOString().split('T')[0]}.md`);
                    document.body.appendChild(downloadAnchor);
                    downloadAnchor.click();
                    downloadAnchor.remove();
                    this.clearError();
                } catch(e) {
                    this.reportError("Markdown Conversion Compilation", e);
                }
            }

            importJSON() {
                try {
                    const txtArea = document.getElementById('importArea');
                    const rawInput = txtArea?.value.trim();
                    if(!rawInput) throw new Error("Empty text payload string context window.");

                    const parsed = JSON.parse(rawInput);
                    if(!Array.isArray(parsed)) throw new TypeError("Import data payload layout must be a structural array index.");

                    this.items = parsed.map(item => this.normalizeItemSchema(item));
                    this.saveState();
                    this.render();
                    if(txtArea) txtArea.value = '';
                    this.switchTab('inbox');
                    alert("State hydrated successfully. Context arrays reset.");
                    this.clearError();
                } catch(e) {
                    this.reportError("State Hydration Import Phase", e);
                    alert(`Hydration Rejected: Check the console window at top of interface screen.`);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.engine = new TaskEngine();
            window.engine.render();
        });
    </script>
</body>
</html>
