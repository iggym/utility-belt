<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Design Prompt Studio</title>
    <style>
        :root { --sidebar-w: 260px; --panel-w: 380px; --bg: #ffffff; --text: #111; --accent: #007aff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f2f2f7; color: var(--text); display: flex; height: 100vh; margin: 0; }
        
        aside { width: var(--sidebar-w); background: #fff; border-right: 1px solid #d1d1d6; padding: 24px; }
        main { flex: 1; overflow-y: auto; padding: 40px; }
        .prompt-panel { width: var(--panel-w); border-left: 1px solid #d1d1d6; padding: 24px; background: #f9f9f9; }
        
        .card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e5e5ea; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--accent); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        textarea { width: 100%; height: 250px; margin-top: 15px; border-radius: 12px; border: 1px solid #c6c6c6; padding: 12px; font-size: 13px; line-height: 1.5; }
    </style>
</head>
<body>

<aside>
    <h3>Categories</h3>
    <div id="filters"></div>
</aside>

<main>
    <div class="grid" id="themeGrid"></div>
</main>

<aside class="prompt-panel">
    <h3>Prompt Builder</h3>
    <label>Industry</label>
    <select id="industry" style="width:100%; margin: 10px 0;">
        <option>AI Startup</option><option>Fintech Platform</option><option>Creative Portfolio</option>
    </select>
    <button onclick="generate()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer;">Generate Specific Prompt</button>
    <textarea id="output"></textarea>
</aside>

<script>
const themes = [
    { name: "Apple Minimalism", philosophy: "Extreme whitespace, San Francisco font, subtle shadows, focus on core content.", palette: "Monochromatic with muted greys", components: "Floating nav, large typography" },
    { name: "Cyberpunk", philosophy: "High-contrast, neon accents, terminal-style monospace fonts, dark mode.", palette: "Electric blue, acid green, deep black", components: "Glowing borders, data-heavy widgets" },
    { name: "Bento Grid", philosophy: "Modular, organized, rounded corners, responsive block structure.", palette: "Neutral backgrounds with accent-colored cards", components: "Nested 2x2 grids" },
    { name: "Neo Brutalism", philosophy: "Raw, unrefined, bold black outlines, high-contrast, harsh geometric shapes.", palette: "High saturation yellow, blue, and black", components: "Thick borders, drop-shadowless buttons" }
];

let selectedTheme = themes[0];

function render() {
    document.getElementById('themeGrid').innerHTML = themes.map(t => `
        <div class="card" onclick="select('${t.name}')">
            <h4>${t.name}</h4>
            <p style="font-size: 12px; opacity: 0.7;">${t.philosophy}</p>
        </div>
    `).join('');
}

function select(name) {
    selectedTheme = themes.find(t => t.name === name);
    alert(`Selected: ${name}`);
}

function generate() {
    const ind = document.getElementById('industry').value;
    document.getElementById('output').value = `Design a website for an ${ind}. 
    
    STYLE: ${selectedTheme.name}
    PHILOSOPHY: ${selectedTheme.philosophy}
    COLOR PALETTE: ${selectedTheme.palette}
    KEY COMPONENTS: ${selectedTheme.components}
    
    Instructions: Create a responsive layout using these principles. Ensure high accessibility scores and clean CSS grid usage.`;
}

render();
</script>
</body>
</html>
