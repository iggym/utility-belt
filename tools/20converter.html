<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universal Bridge 🌉</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.7); --accent: #4f46e5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #eef2f7; display: flex; height: 100vh; margin: 0; }
        aside { width: 300px; padding: 20px; overflow-y: auto; }
        .cat-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 15px; margin-bottom: 8px; border-radius: 12px; border: none; background: var(--glass); cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s; }
        .cat-btn:hover { background: white; transform: translateX(5px); }
        main { flex: 1; display: flex; justify-content: center; align-items: center; }
        .card { width: 400px; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .fact-box { margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 12px; font-size: 14px; color: #64748b; line-height: 1.5; }
    </style>
</head>
<body>

<aside id="sidebar">
    <a href="https://iggym.github.io/utility-belt/" style="display:block; margin-bottom:20px; font-weight:bold; color:var(--accent);">← Home</a>
    <div id="cat-list"></div>
</aside>

<main>
    <div class="card">
        <h2 id="cat-title">Length 📏</h2>
        <input type="number" id="val" value="1" oninput="calculate()" style="width:100%; padding:15px; border:1px solid #ddd; border-radius:12px; font-size:18px;">
        <select id="fromUnit" onchange="calculate()" style="width:100%; padding:10px; margin-top:10px;"></select>
        <select id="toUnit" onchange="calculate()" style="width:100%; padding:10px; margin-top:10px;"></select>
        <div id="output" style="margin-top:20px; font-size:20px; font-weight:600;"></div>
        <div class="fact-box" id="fact">Loading fact...</div>
    </div>
</main>

<script>
const registry = {
    "Length": { icon: "📏", units: {"Meter": 1, "Mile": 0.00062, "Foot": 3.28}, fact: "A 'cubit' was anciently defined by the distance from the elbow to the fingertip (~18 inches)." },
    "Mass": { icon: "⚖️", units: {"Kilogram": 1, "Pound": 2.2, "Ounce": 35.27}, fact: "The 'carat' used for gems is based on the weight of a carob seed!" },
    "Energy": { icon: "⚡", units: {"Joule": 1, "Kilojoule": 0.001, "Calorie": 0.239}, fact: "A 'shake' is a unit of time used in nuclear physics, equal to 10 nanoseconds." },
    "Pressure": { icon: "🌪️", units: {"Pascal": 1, "PSI": 0.000145, "Bar": 0.00001}, fact: "Standard atmospheric pressure is roughly 101,325 Pascals." }
};

function init() {
    const list = document.getElementById('cat-list');
    Object.keys(registry).forEach(cat => {
        list.innerHTML += `<button class="cat-btn" onclick="selectCat('${cat}')"><span>${registry[cat].icon}</span> ${cat}</button>`;
    });
    selectCat('Length');
}

function selectCat(cat) {
    document.getElementById('cat-title').innerText = `${registry[cat].icon} ${cat}`;
    document.getElementById('fact').innerText = registry[cat].fact;
    const units = Object.keys(registry[cat].units);
    document.getElementById('fromUnit').innerHTML = units.map(u => `<option>${u}</option>`).join('');
    document.getElementById('toUnit').innerHTML = units.map(u => `<option>${u}</option>`).join('');
    calculate();
}

function calculate() {
    const cat = document.getElementById('cat-title').innerText.substring(2).trim();
    const val = parseFloat(document.getElementById('val').value);
    const from = document.getElementById('fromUnit').value;
    const to = document.getElementById('toUnit').value;
    const factor = registry[cat].units[to] / registry[cat].units[from];
    document.getElementById('output').innerHTML = `${(val * factor).toFixed(4)} ${to} 🚀`;
}

init();
</script>
</body>
</html>
