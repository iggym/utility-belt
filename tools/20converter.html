<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Bridge 🌉</title>
    <style>
        :root { --accent: #4f46e5; --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.7); }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); display: flex; height: 100vh; margin: 0; }
        aside { width: 320px; padding: 20px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .cat-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px; margin-bottom: 6px; border-radius: 10px; border: none; background: #f8fafc; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .cat-btn:hover { background: #eef2ff; color: var(--accent); }
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { width: 100%; max-width: 500px; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .fact-box { margin-top: 25px; padding: 20px; background: #fdfdfd; border: 1px solid #e2e8f0; border-radius: 16px; font-size: 14px; color: #64748b; line-height: 1.6; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 16px; }
    </style>
</head>
<body>

<aside>
    <a href="https://iggym.github.io/utility-belt/" style="font-weight:bold; color:var(--accent); text-decoration:none; margin-bottom:20px; display:block;">← Home</a>
    <input type="text" id="search" placeholder="Search 20+ units..." oninput="filterCats()" style="padding:12px; border-radius:10px; border:1px solid #e2e8f0; width:100%;">
    <div id="cat-list" style="margin-top:20px; overflow-y:auto;"></div>
</aside>

<main>
    <div class="card">
        <h2 id="cat-title">Length 📏</h2>
        <input type="number" id="val" value="1" oninput="calculate()">
        <select id="fromUnit" onchange="calculate()"></select>
        <select id="toUnit" onchange="calculate()"></select>
        <div id="output" style="margin-top:20px; font-size:28px; font-weight:700; color:var(--accent);"></div>
        <div class="fact-box" id="fact"></div>
    </div>
</main>

<script>
const registry = {
    "Acceleration": { icon: "🚀", units: {"m/s²": 1, "ft/s²": 3.28084, "g-force": 9.80665}, fact: "Acceleration is the rate of change of velocity; it’s why you feel 'pushed' back in your seat in a fast car." },
    "Angle": { icon: "📐", units: {"Degrees": 1, "Radians": 0.0174533, "Gradian": 1.11111}, fact: "Radians are 'unitless' because they are a ratio of arc length to radius." },
    "Area": { icon: "🗺️", units: {"m²": 1, "ft²": 10.7639, "Acre": 0.000247105, "Hectare": 0.0001}, fact: "An acre was originally the amount of land a yoke of oxen could plow in a day." },
    "Concentration": { icon: "🧪", units: {"g/L": 1, "mg/mL": 1, "mol/L": 0.0555}, fact: "Molarity (mol/L) is the standard for chemical reactions." },
    "Dispersion": { icon: "🌫️", units: {"m²/s": 1, "ft²/s": 10.7639}, fact: "Used in fluid dynamics to describe how quickly a dye spreads in a liquid." },
    "Duration": { icon: "⏳", units: {"Seconds": 1, "Minutes": 0.0166667, "Hours": 0.000277778, "Days": 1.1574e-5}, fact: "A 'leap second' is occasionally added to UTC to account for Earth's slowing rotation." },
    "Electric Charge": { icon: "🔋", units: {"Coulomb": 1, "Amp-hour": 0.000277778}, fact: "A single Coulomb is roughly 6.24 × 10¹⁸ electrons." },
    "Electric Current": { icon: "⚡", units: {"Ampere": 1, "Milliamp": 1000, "Microamp": 1000000}, fact: "The Ampere is one of the seven base SI units." },
    "Electric Potential": { icon: "🔌", units: {"Volt": 1, "Millivolt": 1000, "Kilovolt": 0.001}, fact: "Voltage is effectively 'electric pressure' pushing charge through a circuit." },
    "Electric Resistance": { icon: "🚫", units: {"Ohm": 1, "Kiloohm": 0.001, "Megaohm": 0.000001}, fact: "Superconductors have zero electrical resistance when cooled." },
    "Energy": { icon: "🔥", units: {"Joule": 1, "Kilojoule": 0.001, "Calorie": 0.239006, "kWh": 2.7778e-7}, fact: "Energy can be transformed, but never created or destroyed." },
    "Frequency": { icon: "🔊", units: {"Hertz": 1, "kHz": 0.001, "MHz": 0.000001}, fact: "Human hearing range is typically 20Hz to 20kHz." },
    "Fuel Efficiency": { icon: "⛽", units: {"km/L": 1, "L/100km": 100}, fact: "Lower L/100km values mean higher efficiency—a mathematical inverse." },
    "Illuminance": { icon: "💡", units: {"Lux": 1, "Foot-candle": 0.0929}, fact: "A full moon on a clear night provides about 0.1 lux." },
    "Information": { icon: "💾", units: {"Byte": 1, "Kilobyte": 0.001, "Megabyte": 0.000001, "Gigabyte": 1e-9}, fact: "A 'Nibble' is exactly 4 bits, or half a byte." },
    "Length": { icon: "📏", units: {"Meter": 1, "Kilometer": 0.001, "Mile": 0.000621371, "Foot": 3.28084}, fact: "The meter is now defined by the distance light travels in 1/299,792,458 of a second." },
    "Mass": { icon: "⚖️", units: {"Kilogram": 1, "Gram": 1000, "Pound": 2.20462, "Ounce": 35.274}, fact: "Weight changes depending on gravity, but mass remains constant." },
    "Power": { icon: "⚙️", units: {"Watt": 1, "Kilowatt": 0.001, "Horsepower": 0.00134102}, fact: "One horsepower was originally defined as the work a pony could do in a mine." },
    "Pressure": { icon: "🎈", units: {"Pascal": 1, "PSI": 0.000145038, "Bar": 0.00001}, fact: "A Pascal is quite small—about the weight of a sheet of paper over a square meter." },
    "Speed": { icon: "🏎️", units: {"m/s": 1, "km/h": 3.6, "mph": 2.23694}, fact: "The 'Mach' number is the ratio of an object's speed to the speed of sound." },
    "Temperature": { icon: "🌡️", units: {"Celsius": "C", "Fahrenheit": "F", "Kelvin": "K"}, fact: "At -40 degrees, Celsius and Fahrenheit are exactly the same." },
    "Volume": { icon: "🧪", units: {"Liter": 1, "Milliliter": 1000, "Gallon": 0.264172, "Cubic Meter": 0.001}, fact: "One liter of pure water has a mass of almost exactly one kilogram." }
};

function init() { renderList(Object.keys(registry)); selectCat('Length'); }

function renderList(keys) {
    const list = document.getElementById('cat-list');
    list.innerHTML = keys.map(cat => `
        <button class="cat-btn" onclick="selectCat('${cat}')">
            <span>${registry[cat].icon}</span> ${cat}
        </button>
    `).join('');
}

function filterCats() {
    const q = document.getElementById('search').value.toLowerCase();
    renderList(Object.keys(registry).filter(c => c.toLowerCase().includes(q)));
}

function selectCat(cat) {
    document.getElementById('cat-title').innerText = `${registry[cat].icon} ${cat}`;
    document.getElementById('fact').innerText = registry[cat].fact;
    const units = Object.keys(registry[cat].units);
    document.getElementById('fromUnit').innerHTML = units.map(u => `<option>${u}</option>`).join('');
    document.getElementById('toUnit').innerHTML = units.map(u => `<option>${u}</option>`).join('');
    calculate();
}

function calculate() {
    const cat = document.getElementById('cat-title').innerText.substring(2).trim();
    const val = parseFloat(document.getElementById('val').value);
    const from = document.getElementById('fromUnit').value;
    const to = document.getElementById('toUnit').value;
    
    // Simple logic for standard units; Temp handled by switch if needed
    const factor = registry[cat].units[to] / registry[cat].units[from];
    document.getElementById('output').innerHTML = `${(val * factor).toFixed(4)} ${to} 🚀`;
}

init();
</script>
</body>
</html>
