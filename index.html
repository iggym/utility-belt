<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Utility Belt — Tools by aacareq</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & base ────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;
  --surface:#111113;
  --surface-2:#18181b;
  --border:rgba(255,255,255,.08);
  --border-hover:rgba(255,255,255,.16);
  --text:#fafafa;
  --muted:#71717a;
  --subtle:#3f3f46;
  --accent:#6366f1;
  --accent-2:#818cf8;
  --accent-glow:rgba(99,102,241,.15);
  --pill-bg:rgba(255,255,255,.05);
  --pill-active-bg:rgba(99,102,241,.18);
  --pill-active-text:#a5b4fc;
  --radius:10px;
  --card-radius:14px;
  --transition:160ms cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:15px;
  line-height:1.6;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── Ambient background ──────────────────────────────── */
.ambient{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.ambient::before{
  content:'';
  position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 70%);
  top:-200px;left:-100px;
  animation:drift1 20s ease-in-out infinite;
}
.ambient::after{
  content:'';
  position:absolute;
  width:500px;height:500px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(139,92,246,.09) 0%,transparent 70%);
  bottom:-150px;right:-80px;
  animation:drift2 25s ease-in-out infinite;
}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,-40px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,40px)}}

/* ── Nav ─────────────────────────────────────────────── */
nav{
  position:sticky;top:0;z-index:100;
  padding:0 2rem;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(9,9,11,.8);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-brand{
  display:flex;align-items:center;gap:8px;
  font-size:14px;font-weight:600;letter-spacing:-.01em;
  color:var(--text);text-decoration:none;
}
.nav-brand .logo-mark{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
}
.nav-right{
  display:flex;align-items:center;gap:16px;
}
.tool-count{
  font-size:12px;color:var(--muted);
  background:var(--surface-2);
  border:1px solid var(--border);
  padding:3px 10px;border-radius:20px;
  font-weight:500;
}

/* ── Hero ────────────────────────────────────────────── */
.hero{
  position:relative;z-index:1;
  padding:80px 2rem 56px;
  text-align:center;
  max-width:680px;
  margin:0 auto;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  color:var(--accent-2);
  background:var(--accent-glow);
  border:1px solid rgba(99,102,241,.25);
  padding:4px 12px;border-radius:20px;
  margin-bottom:24px;
}
.hero-eyebrow::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent-2);}
.hero h1{
  font-size:clamp(2.4rem,6vw,3.8rem);
  font-weight:600;
  letter-spacing:-.03em;
  line-height:1.15;
  margin-bottom:16px;
  color:var(--text);
}
.hero h1 .grad{
  background:linear-gradient(90deg,#c7d2fe,#a5b4fc,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero p{
  font-size:16px;color:var(--muted);
  max-width:420px;margin:0 auto;
  line-height:1.7;
}

/* ── Main layout ─────────────────────────────────────── */
.wrap{
  position:relative;z-index:1;
  max-width:1100px;
  margin:0 auto;
  padding:0 2rem 80px;
}

/* ── Search ──────────────────────────────────────────── */
.search-wrap{
  position:relative;margin-bottom:20px;
}
.search-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;
  width:16px;height:16px;
}
#search{
  width:100%;
  padding:11px 14px 11px 42px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);
  font-size:14px;
  font-family:inherit;
  outline:none;
  transition:border-color var(--transition),box-shadow var(--transition);
}
#search::placeholder{color:var(--muted)}
#search:focus{
  border-color:rgba(99,102,241,.4);
  box-shadow:0 0 0 3px rgba(99,102,241,.1);
}

/* ── Filter pills ────────────────────────────────────── */
.filters{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-bottom:28px;
}
.pill{
  padding:5px 13px;
  border-radius:20px;
  font-size:13px;font-weight:500;
  cursor:pointer;
  border:1px solid var(--border);
  background:var(--pill-bg);
  color:var(--muted);
  transition:all var(--transition);
  user-select:none;
}
.pill:hover{border-color:var(--border-hover);color:var(--text)}
.pill.active{
  background:var(--pill-active-bg);
  border-color:rgba(99,102,241,.4);
  color:var(--pill-active-text);
}

/* ── Grid ────────────────────────────────────────────── */
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:12px;
}

/* ── Card ────────────────────────────────────────────── */
.card{
  position:relative;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--card-radius);
  padding:1.25rem;
  text-decoration:none;
  color:var(--text);
  display:flex;flex-direction:column;gap:10px;
  transition:border-color var(--transition),transform var(--transition),background var(--transition);
  overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,var(--accent),#8b5cf6,#06b6d4);
  opacity:0;
  transition:opacity var(--transition);
  border-radius:var(--card-radius) var(--card-radius) 0 0;
}
.card:hover{
  border-color:var(--border-hover);
  transform:translateY(-3px);
  background:var(--surface-2);
}
.card:hover::before{opacity:1}

.card-header{
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.card-icon{
  width:36px;height:36px;border-radius:9px;
  background:var(--surface-2);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  transition:background var(--transition);
}
.card:hover .card-icon{background:var(--accent-glow);border-color:rgba(99,102,241,.3);}

.card-arrow{
  width:28px;height:28px;border-radius:7px;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);
  flex-shrink:0;
  transition:all var(--transition);
}
.card:hover .card-arrow{
  border-color:var(--accent);
  color:var(--accent-2);
  background:var(--accent-glow);
}
.card-arrow svg{width:13px;height:13px}

.card h3{
  font-size:14px;font-weight:600;
  letter-spacing:-.01em;
  line-height:1.3;
  flex:1;
  padding-top:1px;
}
.card p{
  font-size:13px;
  color:var(--muted);
  line-height:1.55;
  flex:1;
}
.card-tag{
  display:inline-flex;align-items:center;
  font-size:11px;font-weight:500;letter-spacing:.03em;
  color:var(--muted);
  background:var(--pill-bg);
  border:1px solid var(--border);
  padding:2px 8px;border-radius:20px;
  text-transform:capitalize;
  width:fit-content;
}

/* ── Empty state ─────────────────────────────────────── */
.empty{
  grid-column:1/-1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:64px 24px;
  text-align:center;
  gap:12px;
}
.empty-icon{
  width:48px;height:48px;border-radius:12px;
  background:var(--surface-2);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  margin-bottom:4px;
}
.empty h3{font-size:15px;font-weight:600;color:var(--text)}
.empty p{font-size:13px;color:var(--muted);max-width:280px;line-height:1.6}
.empty button{
  margin-top:4px;
  padding:7px 16px;
  border-radius:var(--radius);
  border:1px solid var(--border);
  background:var(--surface-2);
  color:var(--muted);
  font-size:13px;font-weight:500;font-family:inherit;
  cursor:pointer;
  transition:all var(--transition);
}
.empty button:hover{border-color:var(--border-hover);color:var(--text)}

/* ── Loading skeleton ────────────────────────────────── */
.skeleton{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--card-radius);
  padding:1.25rem;
  display:flex;flex-direction:column;gap:10px;
}
.skel-line{
  height:12px;border-radius:4px;
  background:linear-gradient(90deg,var(--surface-2) 25%,rgba(255,255,255,.04) 50%,var(--surface-2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Stats bar ───────────────────────────────────────── */
.stats-bar{
  display:flex;align-items:center;gap:20px;
  margin-bottom:28px;
  padding-bottom:20px;
  border-bottom:1px solid var(--border);
}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-val{font-size:20px;font-weight:600;letter-spacing:-.02em;color:var(--text)}
.stat-label{font-size:12px;color:var(--muted)}
.stats-divider{width:1px;height:28px;background:var(--border)}
</style>
</head>
<body>

<div class="ambient"></div>

<nav>
  <a class="nav-brand" href="#">
    <div class="logo-mark">🛠</div>
    Utility Belt
  </a>
  <div class="nav-right">
    <span class="tool-count" id="count">Loading…</span>
  </div>
</nav>

<section class="hero">
  <div class="hero-eyebrow">55+ tools shipped</div>
  <h1>Build faster.<br><span class="grad">Ship better.</span></h1>
  <p>Lightweight, single-file tools. No login. No bloat. Just utility.</p>
</section>

<div class="wrap">

  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat"><span class="stat-val" id="stat-total">0</span><span class="stat-label">total tools</span></div>
    <div class="stats-divider"></div>
    <div class="stat"><span class="stat-val" id="stat-cats">0</span><span class="stat-label">categories</span></div>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5l3 3"/>
    </svg>
    <input id="search" type="search" placeholder="Search tools…" autocomplete="off" spellcheck="false">
  </div>

  <div class="filters" id="filters"></div>
  <div id="grid" class="grid"></div>

</div>

<script>
(function(){
  let allTools = [];
  let activeCategory = 'all';

  // ── Fallback demo data (used when manifest.json isn't found) ──
  const DEMO = [
    {title:'Offer Strength Analyzer',description:'PMF scoring for job offers using AI to evaluate comp, role fit, and growth signals.',file:'#',category:'AI',icon:'🧠'},
    {title:'Copilot Bill Shock Calc',description:'Estimate your true GitHub Copilot costs under the new token-based billing model.',file:'#',category:'Dev',icon:'💸'},
    {title:'Exposure — Layoff Analyzer',description:'Diagnostic quiz + AI-powered Value Resume Builder for navigating layoff cycles.',file:'#',category:'Career',icon:'📊'},
    {title:'SIGNAL News Aggregator',description:'AI-curated news feed using Anthropic API for relevance scoring and summarization.',file:'#',category:'AI',icon:'📡'},
    {title:'Obligation Extractor',description:'Paste meeting notes, get your personal action items extracted instantly.',file:'#',category:'Productivity',icon:'✅'},
    {title:'Prompt Library',description:'26 parameterized prompt templates across writing, code, strategy, and research.',file:'#',category:'AI',icon:'📝'},
    {title:'AI Mission Control',description:'Orchestrate 17 inference services from a single unified dashboard.',file:'#',category:'Dev',icon:'🎛'},
    {title:'GoPass Ticket Generator',description:'Single-file transit pass generator. Offline-capable, zero dependencies.',file:'#',category:'Misc',icon:'🚌'},
  ];

  async function load(){
    showSkeletons();
    try {
      const r = await fetch('manifest.json');
      if(!r.ok) throw new Error('not found');
      allTools = await r.json();
    } catch(e){
      allTools = DEMO;
    }
    init();
  }

  function init(){
    const cats = ['all', ...new Set(allTools.map(t => t.category).filter(Boolean))];
    renderFilters(cats);
    updateStats(allTools, cats.length - 1);
    render(allTools);
  }

  function updateStats(tools, catCount){
    const bar = document.getElementById('stats-bar');
    bar.style.display = 'flex';
    document.getElementById('stat-total').textContent = tools.length;
    document.getElementById('stat-cats').textContent = catCount;
    document.getElementById('count').textContent = tools.length + ' Tools';
  }

  function renderFilters(cats){
    const el = document.getElementById('filters');
    el.innerHTML = cats.map(c =>
      `<button class="pill${c==='all'?' active':''}" data-cat="${c}">${c==='all'?'All tools':c}</button>`
    ).join('');
    el.querySelectorAll('.pill').forEach(btn=>{
      btn.addEventListener('click',()=>{
        activeCategory = btn.dataset.cat;
        el.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        filterAndRender();
      });
    });
  }

  function filterAndRender(){
    const q = document.getElementById('search').value.toLowerCase().trim();
    let results = allTools;
    if(activeCategory !== 'all') results = results.filter(t=>t.category===activeCategory);
    if(q) results = results.filter(t=>(t.title+' '+(t.description||'')+' '+(t.category||'')).toLowerCase().includes(q));
    render(results, q || activeCategory !== 'all');
  }

  function render(items, isFiltered){
    const g = document.getElementById('grid');
    if(!items.length){
      g.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🔍</div>
          <h3>No tools found</h3>
          <p>Try a different search term or category.</p>
          <button onclick="clearFilters()">Clear filters</button>
        </div>`;
      return;
    }
    g.innerHTML = items.map(t => `
      <a class="card" href="${t.file||'#'}" ${t.file&&t.file!=='#'?'target="_blank" rel="noopener"':''}>
        <div class="card-header">
          <div class="card-icon">${t.icon||'🔧'}</div>
          <div class="card-arrow">
            <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M2 11L11 2M11 2H5.5M11 2V7.5"/>
            </svg>
          </div>
        </div>
        <h3>${escape(t.title)}</h3>
        ${t.description?`<p>${escape(t.description)}</p>`:''}
        ${t.category?`<span class="card-tag">${escape(t.category)}</span>`:''}
      </a>`).join('');
  }

  function showSkeletons(){
    const g = document.getElementById('grid');
    g.innerHTML = Array(6).fill(0).map(()=>`
      <div class="skeleton">
        <div class="skel-line" style="width:36px;height:36px;border-radius:9px"></div>
        <div class="skel-line" style="width:60%;height:14px;margin-top:4px"></div>
        <div class="skel-line" style="width:90%;height:12px"></div>
        <div class="skel-line" style="width:75%;height:12px"></div>
        <div class="skel-line" style="width:40%;height:11px;margin-top:2px"></div>
      </div>`).join('');
  }

  function escape(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window.clearFilters = function(){
    activeCategory = 'all';
    document.getElementById('search').value = '';
    document.querySelectorAll('.pill').forEach((b,i)=>{
      b.classList.toggle('active', i===0);
    });
    render(allTools);
  };

  document.getElementById('search').addEventListener('input', filterAndRender);

  load();
})();
</script>
</body>
</html>
